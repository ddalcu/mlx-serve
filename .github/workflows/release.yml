name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install mlx-c
        run: brew install mlx-c

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dversion=${{ steps.version.outputs.version }}

      - name: Package and sign binary
        env:
          SIGNING_IDENTITY: "Developer ID Application: David Dalcu (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          STAGING="mlx-serve-macos-arm64"
          mkdir -p "$STAGING/lib"

          # Copy binary
          cp zig-out/bin/mlx-serve "$STAGING/"

          # Bundle required dylibs
          cp /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib "$STAGING/lib/"
          cp /opt/homebrew/opt/mlx/lib/libmlx.dylib "$STAGING/lib/"

          # Fix rpaths so binary finds bundled dylibs
          install_name_tool -change \
            /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib \
            @executable_path/lib/libmlxc.dylib \
            "$STAGING/mlx-serve"

          # Fix libmlxc to find bundled libmlx
          install_name_tool -change \
            /opt/homebrew/opt/mlx/lib/libmlx.dylib \
            @loader_path/libmlx.dylib \
            "$STAGING/lib/libmlxc.dylib"

          # Sign with Developer ID
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$STAGING/lib/libmlx.dylib"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$STAGING/lib/libmlxc.dylib"
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$STAGING/mlx-serve"

          # Verify
          echo "=== Signature ==="
          codesign --verify --deep --strict --verbose=2 "$STAGING/mlx-serve"
          echo "=== Binary deps ==="
          otool -L "$STAGING/mlx-serve"
          echo "=== libmlxc deps ==="
          otool -L "$STAGING/lib/libmlxc.dylib"
          echo "=== Version ==="
          "$STAGING/mlx-serve" --version

          # Create zip for notarization (notarytool requires zip, not tar)
          ditto -c -k --keepParent "$STAGING" "mlx-serve-macos-arm64.zip"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Submit for notarization and wait
          xcrun notarytool submit "mlx-serve-macos-arm64.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Package tarball
        run: tar -czf "mlx-serve-bin-macos-arm64.tar.gz" "mlx-serve-macos-arm64"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: mlx-serve v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: mlx-serve-bin-macos-arm64.tar.gz
