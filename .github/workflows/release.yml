name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + test + package only — skip tag, notarize, release, and formula push. Use to verify the workflow on a branch before cutting a real release."
        type: boolean
        default: false

jobs:
  build:
    # macos-26 (Tahoe) so the Swift app links against the macOS 26 SDK. SwiftUI's
    # MenuBarExtra(.window) popover only gets the correct Tahoe resize/height
    # behavior when linked on-or-after the 26 SDK; building on macos-14 produced a
    # menu-bar tray that wouldn't expand/collapse or retain height on Tahoe.
    # Deployment target stays macOS 14 (Package.swift + Info.plist), so the app
    # still runs on macOS 14+ — only the linked SDK changes.
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode (Swift 6.1+ required by MCP swift-sdk)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: brew bundle install --file=Brewfile

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Extract version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # CalVer YY.M.N — N auto-increments from the last vYY.M.* release tag.
            PREFIX="$(date -u +%y.%-m)"
            LAST_N=$(gh release list --limit 100 --json tagName \
              --jq "[.[] | .tagName | select(test(\"^v${PREFIX}\\\\.[0-9]+$\")) | sub(\"^v${PREFIX}\\\\.\"; \"\") | tonumber] | max // 0")
            N=$((LAST_N + 1))
            VERSION="${PREFIX}.${N}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Fetch libllama (llama.cpp GGUF engine)
        run: bash scripts/fetch-llama.sh

      - name: Build mlx-serve (Zig)
        run: zig build -Doptimize=ReleaseFast -Dversion=${{ steps.version.outputs.version }}

      - name: Smoke test mlx-serve binary
        run: |
          ./zig-out/bin/mlx-serve --version
          ./zig-out/bin/mlx-serve --help > /dev/null

      - name: Run Zig tests
        run: zig build test --summary all

      - name: Build Swift app
        working-directory: app
        # Xcode 26 on the macos-26 runner is Swift 6.3; the swift-sdk 0.10.x pin
        # needs Swift 5 language mode (matches app/build.sh) or its
        # NetworkTransport.swift fails to compile with [#SendingRisksDataRace].
        run: |
          swift build -c release -Xswiftc -swift-version -Xswiftc 5
          echo "SWIFT_BIN_PATH=$(swift build -c release -Xswiftc -swift-version -Xswiftc 5 --show-bin-path)" >> "$GITHUB_ENV"

      - name: Run Swift tests
        working-directory: app
        run: swift test -Xswiftc -swift-version -Xswiftc 5

      # ── CLI tarball (standalone binary + libs) ──
      - name: Package CLI binary
        env:
          SIGNING_IDENTITY: "Developer ID Application: David Dalcu (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          STAGING="mlx-serve-macos-arm64"
          mkdir -p "$STAGING/lib"

          cp zig-out/bin/mlx-serve "$STAGING/"
          cp /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib "$STAGING/lib/"
          # Copy ALL dylibs from mlx's lib dir, not just libmlx.dylib — newer mlx (0.31.2+)
          # introduced sibling deps like libjaccl.dylib referenced via @rpath. Missing them
          # causes a "no such file" dyld error at startup on the user's machine.
          cp /opt/homebrew/opt/mlx/lib/*.dylib "$STAGING/lib/" 2>/dev/null || true
          cp /opt/homebrew/opt/mlx/lib/mlx.metallib "$STAGING/lib/"

          # WebP libraries for vision pipeline
          WEBP_LIB="$(brew --prefix webp)/lib"
          [ -f "$WEBP_LIB/libwebp.dylib" ] && cp "$WEBP_LIB/libwebp.dylib" "$STAGING/lib/"
          [ -f "$WEBP_LIB/libsharpyuv.dylib" ] && cp "$WEBP_LIB/libsharpyuv.dylib" "$STAGING/lib/"

          # libllama (llama.cpp GGUF engine) — single self-contained dylib staged
          # by scripts/fetch-llama.sh, install-name @rpath/libllama.dylib.
          [ -f "lib/llama/lib/libllama.dylib" ] && cp "lib/llama/lib/libllama.dylib" "$STAGING/lib/"

          install_name_tool -change \
            /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib \
            @executable_path/lib/libmlxc.dylib \
            "$STAGING/mlx-serve"

          install_name_tool -change \
            @rpath/libllama.dylib \
            @executable_path/lib/libllama.dylib \
            "$STAGING/mlx-serve" 2>/dev/null || true

          install_name_tool -change \
            /opt/homebrew/opt/mlx/lib/libmlx.dylib \
            @loader_path/libmlx.dylib \
            "$STAGING/lib/libmlxc.dylib"

          # Add @loader_path to libmlx.dylib's rpath so its @rpath/libjaccl.dylib (and any
          # future @rpath sibling deps) resolves to the same lib/ dir we just populated.
          install_name_tool -add_rpath @loader_path "$STAGING/lib/libmlx.dylib" 2>/dev/null || true

          # Fix webp rpaths
          if [ -f "$STAGING/lib/libwebp.dylib" ]; then
            install_name_tool -change \
              "$(otool -L "$STAGING/mlx-serve" | grep libwebp | awk '{print $1}')" \
              @executable_path/lib/libwebp.dylib \
              "$STAGING/mlx-serve" 2>/dev/null || true
            install_name_tool -change \
              "$(otool -L "$STAGING/lib/libwebp.dylib" | grep libsharpyuv | awk '{print $1}')" \
              @loader_path/libsharpyuv.dylib \
              "$STAGING/lib/libwebp.dylib" 2>/dev/null || true
          fi

          for lib in "$STAGING/lib/"*.dylib; do
            [ -f "$lib" ] && codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$lib"
          done
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$STAGING/mlx-serve"

          codesign --verify --deep --strict --verbose=2 "$STAGING/mlx-serve"

          # Smoke test the install_name_tool-rewired binary so missing-dylib
          # errors surface here rather than after notarization.
          "./$STAGING/mlx-serve" --version

          ditto -c -k --keepParent "$STAGING" "mlx-serve-cli.zip"

      # ── .app bundle (menu bar app with everything inside) ──
      - name: Package app bundle
        env:
          SIGNING_IDENTITY: "Developer ID Application: David Dalcu (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          APP="MLX Core.app"
          CONTENTS="$APP/Contents"
          mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Frameworks" "$CONTENTS/Resources"

          # Executables
          cp "$SWIFT_BIN_PATH/MLXCore" "$CONTENTS/MacOS/MLXCore"
          cp zig-out/bin/mlx-serve "$CONTENTS/MacOS/mlx-serve"

          # App resources (tray icon etc.)
          cp -R app/Sources/MLXServe/Resources/* "$CONTENTS/Resources/" 2>/dev/null || true

          # Info.plist
          cp app/Info.plist "$CONTENTS/"

          # App icon
          if [ -f app/appiconb.png ]; then
            ICON_DIR=$(mktemp -d)
            ICONSET="$ICON_DIR/AppIcon.iconset"
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size app/appiconb.png --out "$ICONSET/icon_${size}x${size}.png" > /dev/null 2>&1
              double=$((size * 2))
              sips -z $double $double app/appiconb.png --out "$ICONSET/icon_${size}x${size}@2x.png" > /dev/null 2>&1
            done
            iconutil -c icns "$ICONSET" -o "$CONTENTS/Resources/AppIcon.icns" 2>/dev/null || true
            rm -rf "$ICON_DIR"
          fi

          # Bundled libraries
          cp /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib "$CONTENTS/Frameworks/"
          # Copy ALL dylibs from mlx's lib dir (libmlx.dylib + sibling deps like libjaccl.dylib
          # introduced in mlx 0.31.2). Missing siblings cause a dyld "no such file" error at startup.
          cp /opt/homebrew/opt/mlx/lib/*.dylib "$CONTENTS/Frameworks/" 2>/dev/null || true
          cp /opt/homebrew/opt/mlx/lib/mlx.metallib "$CONTENTS/Frameworks/"

          # WebP libraries for vision pipeline
          WEBP_LIB="$(brew --prefix webp)/lib"
          [ -f "$WEBP_LIB/libwebp.dylib" ] && cp "$WEBP_LIB/libwebp.dylib" "$CONTENTS/Frameworks/"
          [ -f "$WEBP_LIB/libsharpyuv.dylib" ] && cp "$WEBP_LIB/libsharpyuv.dylib" "$CONTENTS/Frameworks/"

          # libllama (llama.cpp GGUF engine) — single self-contained dylib staged
          # by scripts/fetch-llama.sh, install-name @rpath/libllama.dylib.
          [ -f "lib/llama/lib/libllama.dylib" ] && cp "lib/llama/lib/libllama.dylib" "$CONTENTS/Frameworks/"

          # YbridOpus + YbridOgg dynamic frameworks (libopus/libogg) pulled by the
          # SwiftOGG SPM dep — VoicePreprocessor uses them to decode Telegram
          # Ogg/Opus voice notes. SwiftPM fetched them into app/.build/artifacts;
          # embed the macOS slice so the app resolves @rpath/Ybrid*.framework at
          # runtime (without this the .app fails to launch). Mirrors app/build.sh.
          # NOTE: SwiftPM extracts binary artifacts to .build/artifacts (NOT under
          # the per-triple bin dir), so go up TWO levels from --show-bin-path
          # (.build/<triple>/release -> .build) before appending /artifacts.
          ARTIFACTS="$(dirname "$(dirname "$SWIFT_BIN_PATH")")/artifacts"
          for fwname in YbridOpus YbridOgg; do
            fwsrc=$(find "$ARTIFACTS" -path "*macos-arm64*/$fwname.framework" -type d 2>/dev/null | head -1)
            if [ -n "$fwsrc" ]; then
              cp -R "$fwsrc" "$CONTENTS/Frameworks/"
            else
              echo "::error::$fwname.framework not found under $ARTIFACTS — Telegram voice decode would crash the app"
              exit 1
            fi
          done

          # Fix rpaths
          install_name_tool -change \
            "$(otool -L "$CONTENTS/MacOS/mlx-serve" | grep libmlxc | awk '{print $1}')" \
            "@executable_path/../Frameworks/libmlxc.dylib" \
            "$CONTENTS/MacOS/mlx-serve" 2>/dev/null || true

          install_name_tool -change \
            @rpath/libllama.dylib \
            "@executable_path/../Frameworks/libllama.dylib" \
            "$CONTENTS/MacOS/mlx-serve" 2>/dev/null || true

          install_name_tool -change \
            "$(otool -L "$CONTENTS/Frameworks/libmlxc.dylib" | grep libmlx.dylib | head -1 | awk '{print $1}')" \
            "@loader_path/libmlx.dylib" \
            "$CONTENTS/Frameworks/libmlxc.dylib" 2>/dev/null || true

          # Add @loader_path to libmlx.dylib's rpath so its @rpath/libjaccl.dylib (and any other
          # @rpath sibling deps mlx introduces) resolves to the bundled Frameworks dir.
          install_name_tool -add_rpath @loader_path "$CONTENTS/Frameworks/libmlx.dylib" 2>/dev/null || true

          # Fix webp rpaths
          if [ -f "$CONTENTS/Frameworks/libwebp.dylib" ]; then
            install_name_tool -change \
              "$(otool -L "$CONTENTS/MacOS/mlx-serve" | grep libwebp | awk '{print $1}')" \
              "@executable_path/../Frameworks/libwebp.dylib" \
              "$CONTENTS/MacOS/mlx-serve" 2>/dev/null || true
            install_name_tool -change \
              "$(otool -L "$CONTENTS/Frameworks/libwebp.dylib" | grep libsharpyuv | awk '{print $1}')" \
              "@loader_path/libsharpyuv.dylib" \
              "$CONTENTS/Frameworks/libwebp.dylib" 2>/dev/null || true
          fi

          # MLXCore loads the Ybrid frameworks via @rpath/Ybrid*.framework; point
          # @rpath at the bundled Frameworks dir (SwiftPM's dev rpath into
          # .build/artifacts doesn't survive packaging, so without this the app
          # can't launch). Mirrors app/build.sh.
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$CONTENTS/MacOS/MLXCore" 2>/dev/null || true

          # Sign inside-out
          chmod -R u+w "$APP"
          for fw in "$CONTENTS/Frameworks/"*.metallib "$CONTENTS/Frameworks/"*.dylib; do
            [ -f "$fw" ] && codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$fw"
          done
          # Embedded .framework bundles (YbridOpus/YbridOgg) — re-sign over the
          # vendor signature with our Developer ID + hardened runtime so dyld
          # accepts them and notarization passes.
          for fw in "$CONTENTS/Frameworks/"*.framework; do
            [ -d "$fw" ] && codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$fw"
          done
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" "$CONTENTS/MacOS/mlx-serve"
          # MLXCore + the .app need the mic entitlement, or Voice mode is denied
          # microphone access under hardened runtime without ever prompting.
          # Frameworks/dylibs and the headless mlx-serve must NOT carry it.
          codesign --force --options runtime --entitlements app/MLXCore.entitlements --sign "$SIGNING_IDENTITY" "$CONTENTS/MacOS/MLXCore"
          codesign --force --options runtime --entitlements app/MLXCore.entitlements --sign "$SIGNING_IDENTITY" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"
          ditto -c -k --keepParent "$APP" "MLXCore-app.zip"

      # ── Notarize both ──
      - name: Notarize CLI
        if: ${{ !inputs.dry_run }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "mlx-serve-cli.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Notarize app bundle
        if: ${{ !inputs.dry_run }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "MLXCore-app.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the app bundle
          xcrun stapler staple "MLX Core.app"
          rm -f "MLXCore-app.zip"

      - name: Create DMG installer
        run: bash scripts/create-dmg.sh "MLX Core.app" MLXCore.dmg

      # ── Package final artifacts ──
      - name: Package CLI tarball
        run: tar -czf "mlx-serve-bin-macos-arm64.tar.gz" "mlx-serve-macos-arm64"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - name: Create Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: mlx-serve v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            mlx-serve-bin-macos-arm64.tar.gz
            MLXCore.dmg

      - name: Upload dry-run artifacts
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-${{ steps.version.outputs.version }}
          path: |
            mlx-serve-bin-macos-arm64.tar.gz
            MLXCore.dmg
          retention-days: 7

      - name: Update Homebrew formulas
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_SHA=$(shasum -a 256 MLXCore.dmg | awk '{print $1}')
          CLI_SHA=$(shasum -a 256 mlx-serve-bin-macos-arm64.tar.gz | awk '{print $1}')

          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/mlx-core.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$DMG_SHA\"/" Casks/mlx-core.rb

          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Formula/mlx-serve.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$CLI_SHA\"/" Formula/mlx-serve.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/mlx-core.rb Formula/mlx-serve.rb
          git commit -m "brew: update to v$VERSION"

          # Retry with rebase in case main advanced during the build
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $i rejected; rebasing on latest main and retrying..."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 2))
          done
          echo "failed to push Homebrew formula update after 5 attempts" >&2
          exit 1
